<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileEditorJS Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f4f7f6;
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .controls {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }
      #viewer-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        min-height: 500px;
        overflow: auto;
      }
      .btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover {
        background-color: #0056b3;
      }
      input[type="file"] {
        padding: 8px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      td,
      th {
        border: 1px solid #ddd;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>FileEditorJS</h1>
      <p>View and Edit .docx and .xlsx files directly in your browser</p>
    </div>

    <div class="controls">
      <input type="file" id="file-input" accept=".docx, .xlsx" />
      <span id="file-status">No file selected</span>
    </div>

    <div id="viewer-container">
      <p style="text-align: center; color: #888; margin-top: 200px">
        Upload a .docx or .xlsx file to start editing
      </p>
    </div>

    <!-- Dependencies -->
    <!-- JSZip for DOCX and XLSX -->
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <!-- Mammoth for DOCX to HTML -->
    <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <!-- Docx-preview for high fidelity DOCX viewing -->
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>
    <!-- SheetJS for XLSX parsing and writing -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <!-- HTML to DOCX -->
    <script src="https://cdn.jsdelivr.net/gh/evidenceprime/html-docx-js@master/dist/html-docx.js"></script>

    <!-- Our Library -->
    <script src="../src/FileEditor.js"></script>

    <script>
      const fileInput = document.getElementById("file-input");
      const fileStatus = document.getElementById("file-status");
      const editor = new FileEditor("viewer-container");

      fileInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileStatus.textContent = `Loading: ${file.name}...`;

        try {
          await editor.loadFile(file);
          fileStatus.textContent = `Active File: ${file.name}`;
        } catch (err) {
          console.error(err);
          alert("Error loading file: " + err.message);
          fileStatus.textContent = "Error loading file";
        }
      });
    </script>
  </body>
</html>
